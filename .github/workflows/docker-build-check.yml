name: Docker Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - "agent_code/**"
      - "dashboard/**"
      - "landing-page/**"
      - "web/**"
      - "whatsapp_gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: agent-api
            context: ./agent_code
            file: ./agent_code/Dockerfile
          - name: dashboard
            context: ./dashboard
            file: ./dashboard/Dockerfile
          - name: landing-page
            context: ./landing-page
            file: ./landing-page/Dockerfile
          - name: web
            context: ./web
            file: ./web/Dockerfile
          - name: whatsapp-gateway
            context: ./whatsapp_gateway
            file: ./whatsapp_gateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: false
