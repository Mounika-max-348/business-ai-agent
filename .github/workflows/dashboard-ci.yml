name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Dashboard lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
